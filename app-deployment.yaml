apiVersion: apps/v1
kind: Deployment
metadata:
  name: carpooling-backend-deployment
spec:
  selector:
    matchLabels:
      app: carpooling-backend
  replicas: 3
  template:
    metadata:
      labels:
        app: carpooling-backend
    spec:
      containers:
        - name: carpooling-backend-container
          image: springboot-carpooling-k8s:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: db
          # 🆕 AJOUTER CE BLOC CI-DESSOUS pour stabiliser le démarrage :
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 15  # Laisse 15 secondes à Spring Boot pour démarrer
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: carpooling-backend-svc
spec:
  selector:
    app: carpooling-backend
  ports:
    - protocol: "TCP"
      port: 8081
      targetPort: 8081
  type: NodePort