apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim
  labels:
    app: carpooling
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carpooling-db
spec:
  selector:
    matchLabels:
      app: carpooling
      tier: database
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: carpooling
        tier: database
    spec:
      containers:
        - image: mariadb:latest
          name: mariadb
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: springboot
          ports:
            - containerPort: 3306
              name: mariadb
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: db  # Ce nom sert de DNS (remplace l'adresse IP)
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: carpooling
    tier: database
  clusterIP: None