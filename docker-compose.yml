version: '3.8'

services:
  # 1. Le conteneur de la base de données MariaDB
  db:
    image: mariadb:latest
    container_name: carpooling-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: springboot
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  # 2. Le conteneur du Backend Spring Boot
  backend:
    build: ./backend
    container_name: carpooling-backend
    ports:
      - "8081:8081"
    environment:
      # On remplace host.docker.internal par le nom du service 'db' de Docker
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/springboot
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db

  # 3. Le conteneur du Frontend React
  frontend:
    build: ./frontend
    container_name: carpooling-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mariadb_data: