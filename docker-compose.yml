services:
  # 1. Le conteneur de la base de données MariaDB
  db:
    image: mariadb:latest
    container_name: carpooling-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: springboot
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    # 🆕 On ajoute une vérification de l'état de la base
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Le conteneur du Backend Spring Boot
  backend:
    build: ./SpringDataRest
    container_name: carpooling-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/springboot
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    # 🆕 On modifie le depends_on pour attendre que la DB soit saine (healthy)
    depends_on:
      db:
        condition: service_healthy

  # 3. Le conteneur du Frontend React
  frontend:
    build: ./myapp
    container_name: carpooling-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mariadb_data: